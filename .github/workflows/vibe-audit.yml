name: Vibe Audit

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: vibe-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  vibe-audit:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd demo && npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Vibe Audit v3 (multi-layer)
        run: node scripts/analyze-v3.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # To use a different provider, set these instead:
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # VIBE_AUDIT_PROVIDER: openai
          VIBE_AUDIT_VISUAL: 'true'
          VIBE_AUDIT_BASE_URL: 'http://localhost:3000'

      - name: Upload visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vibe-audit-visual
          path: |
            .vibe-audit/screenshots/
            demo/test-results/
          if-no-files-found: ignore

      - name: Post report as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('vibe-audit-report.md')) {
              console.log('No report file found, skipping comment.');
              return;
            }

            const report = fs.readFileSync('vibe-audit-report.md', 'utf-8');
            const marker = '<!-- vibe-audit-report -->';
            const body = `${marker}\n${report}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
