name: Vibe Audit

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: vibe-audit-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  vibe-audit:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Vibe Audit
        run: node scripts/analyze-diff.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # To use a different provider, set these instead:
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # VIBE_AUDIT_PROVIDER: openai

      - name: Post report as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            if (!fs.existsSync('vibe-audit-report.md')) {
              console.log('No report file found, skipping comment.');
              return;
            }

            const report = fs.readFileSync('vibe-audit-report.md', 'utf-8');
            const marker = '<!-- vibe-audit-report -->';
            const body = `${marker}\n${report}`;

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
